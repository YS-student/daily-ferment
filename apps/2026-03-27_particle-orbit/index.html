<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Orbit — Daily Ferment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            cursor: crosshair;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }

        .title {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 10;
            pointer-events: none;
        }

        .title h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: -0.02em;
        }

        .title p {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 4px;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>
    <div class="title">
        <h1>Particle Orbit</h1>
        <p>マウスで引力場を操る</p>
    </div>
    <canvas id="canvas"></canvas>
    <div class="info">マウスを動かして粒子を操ろう ✦ クリックで爆発</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, dpr;
        let mouse = { x: 0, y: 0, active: false };
        let particles = [];
        const PARTICLE_COUNT = 600;

        const COLORS = [
            [192, 132, 252], // purple
            [129, 140, 248], // indigo
            [52, 211, 153],  // emerald
            [251, 146, 60],  // amber
            [244, 114, 182], // pink
        ];

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 0.5;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = Math.random() * 0.5 + 0.3;
                this.orbitSpeed = (Math.random() - 0.5) * 0.02;
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = 300;

                    if (dist < maxDist) {
                        const force = (1 - dist / maxDist) * 0.08;
                        // Add tangential force for orbit effect
                        const nx = dx / dist;
                        const ny = dy / dist;
                        this.vx += nx * force + (-ny) * this.orbitSpeed * (maxDist - dist) * 0.1;
                        this.vy += ny * force + nx * this.orbitSpeed * (maxDist - dist) * 0.1;
                    }
                }

                // Friction
                this.vx *= 0.98;
                this.vy *= 0.98;

                this.x += this.vx;
                this.y += this.vy;

                // Wrap around
                if (this.x < -10) this.x = width + 10;
                if (this.x > width + 10) this.x = -10;
                if (this.y < -10) this.y = height + 10;
                if (this.y > height + 10) this.y = -10;

                this.angle += 0.01;
            }

            draw() {
                const [r, g, b] = this.color;
                // Glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha * 0.1})`;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha})`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
        }

        function explode(x, y) {
            particles.forEach(p => {
                const dx = p.x - x;
                const dy = p.y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 250) {
                    const force = (1 - dist / 250) * 8;
                    p.vx += (dx / dist) * force;
                    p.vy += (dy / dist) * force;
                }
            });
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = dx * dx + dy * dy;
                    const maxDist = 3600; // 60^2

                    if (dist < maxDist) {
                        const alpha = (1 - dist / maxDist) * 0.15;
                        const [r, g, b] = particles[i].color;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
            ctx.fillRect(0, 0, width, height);

            drawConnections();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Mouse glow
            if (mouse.active) {
                const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
                grad.addColorStop(0, 'rgba(192, 132, 252, 0.05)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(mouse.x - 150, mouse.y - 150, 300, 300);
            }

            requestAnimationFrame(animate);
        }

        // Events
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.active = false;
        });

        canvas.addEventListener('click', e => {
            explode(e.clientX, e.clientY);
        });

        // Touch support
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.active = true;
        }, { passive: false });

        canvas.addEventListener('touchstart', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.active = true;
        });

        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });

        init();
        animate();
    </script>
</body>

</html>
