<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Potential</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #030408;
      font-family: 'Inter', -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      transition: opacity 2s ease-in-out;
      color: rgba(255, 255, 255, 0.7);
    }

    .hidden {
      opacity: 0 !important;
    }

    h1 {
      font-weight: 200;
      letter-spacing: 0.4em;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      font-size: 1.4rem;
      text-shadow: 0 0 15px rgba(100, 200, 255, 0.6);
    }

    p {
      font-weight: 300;
      letter-spacing: 0.1em;
      font-size: 0.75rem;
      opacity: 0.5;
      margin: 0;
    }

    #back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 20;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      transition: color 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 4px;
      pointer-events: auto;
    }
    #back-btn:hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <a id="back-btn" href="../../index.html">← PORTAL</a>
  
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>
  
  <div id="ui-layer">
    <h1>Elastic Potential</h1>
    <p>Drag the core to accumulate tension. Release to recover.</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const uiLayer = document.getElementById('ui-layer');

    let width, height;
    let hasStarted = false;

    // --- Physics Entities ---
    let anchor = { x: 0, y: 0 };
    let core = { x: 0, y: 0, vx: 0, vy: 0 };
    let isDragging = false;
    let maxTensionReached = 0;
    let particles = [];
    let ripples = [];

    // Tethers to corners/edges
    let tethers = [];

    // --- Audio System ---
    let audioCtx;
    let masterGain;
    let tensionOsc, tensionGain, tensionFilter;
    let releaseChords = [];
    let isTensionPlaying = false;

    // F Lydian / Fmaj9#11 bright, resolving, expansive chord
    const releaseFrequencies = [174.61, 261.63, 329.63, 392.00, 493.88]; // F3, C4, E4, G4, B4

    function initAudio() {
      if (audioCtx) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
      
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.8;
      masterGain.connect(audioCtx.destination);
      
      // Tension Synth
      tensionGain = audioCtx.createGain();
      tensionGain.gain.value = 0;
      tensionGain.connect(masterGain);
      
      tensionOsc = audioCtx.createOscillator();
      tensionOsc.type = 'sawtooth';
      tensionOsc.frequency.value = 50;
      
      tensionFilter = audioCtx.createBiquadFilter();
      tensionFilter.type = 'lowpass';
      tensionFilter.frequency.value = 100;
      tensionFilter.Q.value = 15; // High resonance for squealing tension
      
      tensionOsc.connect(tensionFilter);
      tensionFilter.connect(tensionGain);
      tensionOsc.start();
    }

    function triggerRelease(intensity) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      
      // Stop tension immediately
      tensionGain.gain.setTargetAtTime(0, now, 0.02);
      
      // Trigger deep impact
      const boomOsc = audioCtx.createOscillator();
      boomOsc.type = 'sine';
      boomOsc.frequency.setValueAtTime(150, now);
      boomOsc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
      
      const boomGain = audioCtx.createGain();
      boomGain.gain.setValueAtTime(intensity * 1.5, now);
      boomGain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
      
      boomOsc.connect(boomGain);
      boomGain.connect(masterGain);
      boomOsc.start(now);
      boomOsc.stop(now + 2.0);
      
      // Trigger harmonious chord explosion
      releaseFrequencies.forEach((freq, idx) => {
        const chordOsc = audioCtx.createOscillator();
        // Mix sine for body and triangle for brightness
        chordOsc.type = idx % 2 === 0 ? 'sine' : 'triangle';
        chordOsc.frequency.value = freq;
        // slightly detune
        chordOsc.frequency.value += (Math.random() - 0.5) * 2;
        
        const chordGain = audioCtx.createGain();
        chordGain.gain.setValueAtTime(0, now);
        chordGain.gain.linearRampToValueAtTime(intensity * 0.2, now + 0.1);
        // Long beautiful release
        chordGain.gain.exponentialRampToValueAtTime(0.001, now + 4.0 + idx * 0.5);
        
        chordOsc.connect(chordGain);
        chordGain.connect(masterGain);
        chordOsc.start(now);
        chordOsc.stop(now + 6.0);
      });
    }

    function updateAudio(dist) {
      if (!audioCtx || !isDragging) return;
      const now = audioCtx.currentTime;
      
      // Tension scales with distance (max ~400px)
      const normalizedDist = Math.min(1.0, dist / 400);
      
      // Volume rises with distance
      tensionGain.gain.setTargetAtTime(normalizedDist * 0.3, now, 0.1);
      
      // Pitch and filter frequency rises uncomfortably with distance
      tensionOsc.frequency.setTargetAtTime(50 + normalizedDist * 150, now, 0.1);
      tensionFilter.frequency.setTargetAtTime(100 + Math.pow(normalizedDist, 2) * 2000, now, 0.1);
    }

    // --- Visual Entities ---
    class Particle {
      constructor(x, y, power) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * power * 25 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 3 + 1;
        this.life = 1.0;
        this.decay = Math.random() * 0.01 + 0.005;
        // Cyan to Gold hues
        this.hue = Math.random() > 0.5 ? (180 + Math.random()*40) : (40 + Math.random()*30);
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.94; // heavy friction so they slow down beautifully
        this.vy *= 0.94;
        this.life -= this.decay;
      }
      
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsla(${this.hue}, 100%, 50%, ${this.life})`;
      }
    }

    class Ripple {
      constructor(x, y, power) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = power * 1000 + 200;
        this.speed = power * 30 + 10;
        this.life = 1.0;
      }
      
      update() {
        this.radius += this.speed;
        this.speed *= 0.95;
        this.life -= 0.015;
      }
      
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.strokeStyle = `rgba(150, 220, 255, ${this.life * 0.5})`;
        ctx.lineWidth = 2 + this.life * 5;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.stroke();
      }
    }

    function setupTethers() {
      tethers = [
        { x: 0, y: 0 },
        { x: width, y: 0 },
        { x: 0, y: height },
        { x: width, y: height },
        { x: width/2, y: 0 },
        { x: width/2, y: height },
        { x: 0, y: height/2 },
        { x: width, y: height/2 }
      ];
    }

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      anchor.x = width / 2;
      anchor.y = height / 2;
      
      if(!hasStarted) {
         core.x = anchor.x;
         core.y = anchor.y;
      }
      setupTethers();
    }

    // --- Input Handling ---
    let dragOffset = { x: 0, y: 0 };
    
    function onDown(e) {
      if (!hasStarted) {
        hasStarted = true;
        uiLayer.classList.add('hidden');
        initAudio();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      
      let clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      const dx = clientX - core.x;
      const dy = clientY - core.y;
      
      // Grab radius is large so it's easy to interact
      if (Math.hypot(dx, dy) < 150) {
        isDragging = true;
        maxTensionReached = 0;
        dragOffset.x = core.x - clientX;
        dragOffset.y = core.y - clientY;
      }
    }

    function onMove(e) {
      if (!isDragging) return;
      
      let clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      core.x = clientX + dragOffset.x;
      core.y = clientY + dragOffset.y;
      core.vx = 0;
      core.vy = 0;
    }

    function onUp(e) {
      if (isDragging) {
        isDragging = false;
        
        // Calculate tension released
        const dist = Math.hypot(core.x - anchor.x, core.y - anchor.y);
        const normalizedPower = Math.min(1.0, dist / 400); // 0.0 to 1.0
        
        if (normalizedPower > 0.1) {
          triggerRelease(normalizedPower);
          
          // Generate Particles & Ripple
          const numP = Math.floor(normalizedPower * 400 + 50);
          for(let i=0; i<numP; i++) {
            particles.push(new Particle(core.x, core.y, normalizedPower));
          }
          ripples.push(new Ripple(core.x, core.y, normalizedPower));
        } else {
           // Muted release if just slightly dragged
           if(audioCtx && tensionGain) {
             tensionGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
           }
        }
      }
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    
    window.addEventListener('touchstart', onDown, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onUp);

    resize();

    // --- Main Loop ---
    let frameTime = 0;

    function animate() {
      // Clear with very dark trailing effect
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = `rgba(3, 4, 8, 0.3)`;
      ctx.fillRect(0, 0, width, height);
      
      ctx.globalCompositeOperation = 'lighter';
      frameTime += 0.01;

      const distFromAnchor = Math.hypot(core.x - anchor.x, core.y - anchor.y);
      const normalizedDist = Math.min(1.0, distFromAnchor / 400);
      
      if (!isDragging) {
        // --- Spring Physics (Recovery / Snap back) ---
        const k = 0.08; // Spring stiffness
        const damp = 0.85; // Damping / Friction
        
        const forceX = (anchor.x - core.x) * k;
        const forceY = (anchor.y - core.y) * k;
        
        core.vx += forceX;
        core.vy += forceY;
        
        core.vx *= damp;
        core.vy *= damp;
        
        core.x += core.vx;
        core.y += core.vy;
      } else {
        // Update audio tension
        updateAudio(distFromAnchor);
        if (normalizedDist > maxTensionReached) maxTensionReached = normalizedDist;
      }

      // Draw Tethers (Tension Lines)
      ctx.lineWidth = 1;
      for (let t of tethers) {
        const dx = t.x - core.x;
        const dy = t.y - core.y;
        const distSq = dx*dx + dy*dy;
        const tension = Math.min(1.0, distSq / (width*width + height*height));
        
        // Color shifts from cyan to deep red/purple under tension
        let r = 80 + tension * 170;
        let g = 200 - tension * 150;
        let b = 255 - tension * 100;
        
        // Add jitter if stretched too far (agony of tension)
        let jx = 0;
        let jy = 0;
        if (isDragging && distFromAnchor > 300) {
           const shake = (distFromAnchor - 300) * 0.05;
           jx = (Math.random()-0.5) * shake;
           jy = (Math.random()-0.5) * shake;
        }

        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.1 + tension * 0.3})`;
        ctx.beginPath();
        ctx.moveTo(t.x, t.y);
        ctx.lineTo(core.x + jx, core.y + jy);
        ctx.stroke();
      }

      // Draw Ripples
      for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.update();
        r.draw(ctx);
        if (r.life <= 0) ripples.splice(i, 1);
      }

      // Draw Particles
      ctx.shadowBlur = 0; // reset for performance
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        p.draw(ctx);
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Draw Core
      // Core pulses gently, but vibrates when dragged heavily
      let coreShakeX = 0;
      let coreShakeY = 0;
      if (isDragging) {
         coreShakeX = (Math.random()-0.5) * (normalizedDist * 10);
         coreShakeY = (Math.random()-0.5) * (normalizedDist * 10);
      }
      
      const coreR = isDragging ? Math.floor(100 + normalizedDist * 155) : 100;
      const coreG = isDragging ? Math.floor(200 - normalizedDist * 150) : 220;
      const coreB = 255;
      
      // Halo
      const pulse = Math.sin(frameTime * 5) * 5;
      const baseRadius = 15;
      
      ctx.fillStyle = `rgba(${coreR}, ${coreG}, ${coreB}, 0.8)`;
      ctx.beginPath();
      ctx.arc(core.x + coreShakeX, core.y + coreShakeY, baseRadius, 0, Math.PI*2);
      ctx.fill();
      
      ctx.shadowBlur = 30 + normalizedDist * 40 + pulse;
      ctx.shadowColor = `rgba(${coreR}, ${coreG}, ${coreB}, 1.0)`;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(core.x + coreShakeX, core.y + coreShakeY, baseRadius * 0.5, 0, Math.PI*2);
      ctx.fill();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
